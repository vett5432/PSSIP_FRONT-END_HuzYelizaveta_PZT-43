<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid Demo — All Properties</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        /*  GRID CONTAINER — ВСЕ СВОЙСТВА*/
        .grid-container {
            display: grid;

            /* Явные строки и колонки */
            grid-template-rows: 120px 120px;
            grid-template-columns: 200px 1fr 150px;

            /* Области */
            grid-template-areas:
                "a b c"
                "d e f";

            /* repeat() + minmax() — пример в комментариях */
           

            /* GAP */
            grid-row-gap: 20px;
            grid-column-gap: 20px;
            grid-gap: 20px;

            /* Выравнивание всей сетки */
            align-content: center;
            justify-content: center;
            place-content: center center;

            /* Выравнивание элементов внутри ячеек */
            align-items: center;
            justify-items: center;
            place-items: center center;

            /* Автоматически создаваемые строки/колонки */
            grid-auto-rows: 100px;
            grid-auto-columns: 100px;

            /* Алгоритм размещения */
            grid-auto-flow: row dense;

            /* Короткая запись grid — пример */
            

            background: #222;
            padding: 20px;
            border-radius: 10px;
        }

        /* GRID ITEMS — ВСЕ СВОЙСТВА*/
        .item {
            background: #333;
            border: 2px solid #555;
            padding: 10px;
            font-size: 24px;
            text-align: center;
        }

        /* Привязка к областям */
        .a { grid-area: a; }
        .b { grid-area: b; }
        .c { grid-area: c; }
        .d { grid-area: d; }
        .e { grid-area: e; }
        .f { grid-area: f; }

        /* Демонстрация item-свойств */
        .b {
            grid-row-start: 1;
            grid-row-end: 3; /* занимает 2 строки */

            grid-column-start: 2;
            grid-column-end: 4; /* занимает 2 колонки */

            /* Короткие записи */
            /* grid-row: 1 / 3; */
            /* grid-column: 2 / 4; */

            background: #550055;
        }
    </style>
</head>
<body>

<h1>Демонстрация CSS Grid (все свойства)</h1>

<section class="grid-container">
    <div class="item a">A</div>
    <div class="item b">B</div>
    <div class="item c">C</div>
    <div class="item d">D</div>
    <div class="item e">E</div>
    <div class="item f">F</div>
</section>

</body>
</html>
